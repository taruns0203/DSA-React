<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Intervals - Brute Force</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1050px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        h1 { font-size: 1.5em; margin-bottom: 8px; }
        .subtitle { font-size: 1em; opacity: 0.9; }
        .complexity-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 15px;
            margin-top: 8px;
            font-size: 0.85em;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 250px;
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 0.95em;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f5576c;
        }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; }
        .btn-warning { background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%); color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .speed-control { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 140px; }
        .speed-control input[type="range"] { flex: 1; height: 5px; }
        .intervals-display {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 60px;
        }
        .interval {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9em;
            background: #e8eaf6;
            border: 3px solid #5c6bc0;
            transition: all 0.3s;
        }
        .interval.comparing-i { background: #ffcdd2; border-color: #e53935; }
        .interval.comparing-j { background: #bbdefb; border-color: #1976d2; }
        .interval.merged { background: #c8e6c9; border-color: #43a047; animation: pulse 0.5s; }
        .interval.done { background: #b2dfdb; border-color: #00897b; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .comparison-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            font-size: 0.9em;
        }
        .comp-interval { padding: 8px 12px; border-radius: 8px; font-weight: 700; }
        .comp-i { background: #ffcdd2; color: #c62828; }
        .comp-j { background: #bbdefb; color: #1565c0; }
        .comp-result { background: #c8e6c9; color: #2e7d32; }
        .overlap-indicator {
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 700;
        }
        .overlap-yes { background: #c8e6c9; color: #2e7d32; }
        .overlap-no { background: #ffcdd2; color: #c62828; }
        .timeline {
            background: white;
            border-radius: 8px;
            padding: 15px;
            position: relative;
            height: 120px;
        }
        .timeline-axis {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: #ccc;
        }
        .timeline-bar {
            position: absolute;
            height: 20px;
            border-radius: 4px;
            opacity: 0.8;
            transition: all 0.3s;
        }
        .action-indicator {
            text-align: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85em;
        }
        .state-display { background: white; border-radius: 8px; padding: 10px; font-family: 'Courier New', monospace; font-size: 0.8em; }
        .state-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #e0e0e0; }
        .state-row:last-child { border-bottom: none; }
        .state-label { font-weight: 600; color: #f5576c; }
        .log-container { background: white; border-radius: 8px; padding: 10px; max-height: 150px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.6em; }
        .log-entry { padding: 3px 6px; margin: 2px 0; border-radius: 4px; border-left: 3px solid #f5576c; background: #f8f9fa; }
        .log-entry.success { border-left-color: #28a745; background: #d4edda; }
        .log-entry.warning { border-left-color: #ffc107; background: #fff3cd; }
        .log-entry.info { border-left-color: #17a2b8; background: #d1ecf1; }
        @media (max-width: 800px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 Merge Intervals</h1>
            <div class="subtitle">Brute Force - Compare Every Pair</div>
            <div class="complexity-badge">Time: O(n³) | Space: O(n)</div>
        </header>
        <div class="main-content">
            <div class="left-panel">
                <div class="card">
                    <div class="card-title">⚙️ Controls</div>
                    <div class="controls">
                        <button class="btn-primary" id="playBtn">▶️ Play</button>
                        <button class="btn-warning" id="pauseBtn" disabled>⏸️ Pause</button>
                        <button class="btn-success" id="stepBtn">⏭️ Step</button>
                        <button class="btn-secondary" id="resetBtn">🔄 Reset</button>
                        <div class="speed-control">
                            <label>Speed:</label>
                            <input type="range" id="speedSlider" min="1" max="10" value="5">
                            <span id="speedValue">5x</span>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">📋 Current Intervals</div>
                    <div class="intervals-display" id="intervalsDisplay"></div>
                </div>
                <div class="card">
                    <div class="card-title">🔍 Comparing (check overlap)</div>
                    <div class="comparison-display" id="comparisonDisplay">
                        <span class="comp-interval comp-i">[?,?]</span>
                        <span class="overlap-indicator" id="overlapIndicator">?</span>
                        <span class="comp-interval comp-j">[?,?]</span>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">📊 Timeline View</div>
                    <div class="timeline" id="timeline">
                        <div class="timeline-axis"></div>
                    </div>
                </div>
                <div class="card">
                    <div class="action-indicator" id="actionIndicator">Ready to start</div>
                </div>
            </div>
            <div class="right-panel">
                <div class="card">
                    <div class="card-title">📋 Current State</div>
                    <div class="state-display">
                        <div class="state-row"><span class="state-label">Pass:</span><span id="passState">1</span></div>
                        <div class="state-row"><span class="state-label">i:</span><span id="iState">0</span></div>
                        <div class="state-row"><span class="state-label">j:</span><span id="jState">1</span></div>
                        <div class="state-row"><span class="state-label">n:</span><span id="nState">4</span></div>
                    </div>
                </div>
                <div class="card" style="flex: 1;">
                    <div class="card-title">📝 Execution Log</div>
                    <div class="log-container" id="logContainer"><div class="log-entry info">Compare all pairs, merge overlaps.</div></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let intervals = [[1,3],[2,6],[8,10],[15,18]];
        
        let i = 0, j = 1;
        let pass = 1;
        let changed = false;
        let foundMerge = false;
        let isRunning = false;
        let speed = 5;
        let stepCount = 0;
        let done = false;
        const colors = ['#e57373', '#64b5f6', '#81c784', '#ffb74d', '#ba68c8', '#4db6ac'];

        function init() {
            intervals = [[1,3],[2,6],[8,10],[15,18]];
            i = 0;
            j = 1;
            pass = 1;
            changed = true;
            foundMerge = false;
            stepCount = 0;
            done = false;
            
            clearLog();
            addLog('Pass 1: Compare all pairs', 'info');
            updateState();
            render();
        }

        function overlaps(a, b) {
            return a[0] <= b[1] && b[0] <= a[1];
        }

        function mergeTwo(a, b) {
            return [Math.min(a[0], b[0]), Math.max(a[1], b[1])];
        }

        function render() {
            // Intervals display
            const display = document.getElementById('intervalsDisplay');
            display.innerHTML = intervals.map((int, idx) => {
                let cls = 'interval';
                if (!done && idx === i) cls += ' comparing-i';
                else if (!done && idx === j) cls += ' comparing-j';
                else if (done) cls += ' done';
                return `<div class="${cls}">[${int[0]},${int[1]}]</div>`;
            }).join('');
            
            // Comparison display
            const compDisplay = document.getElementById('comparisonDisplay');
            if (!done && i < intervals.length && j < intervals.length) {
                const overlap = overlaps(intervals[i], intervals[j]);
                compDisplay.innerHTML = `
                    <span class="comp-interval comp-i">[${intervals[i][0]},${intervals[i][1]}]</span>
                    <span class="overlap-indicator ${overlap ? 'overlap-yes' : 'overlap-no'}">${overlap ? '✓ Overlap' : '✗ No'}</span>
                    <span class="comp-interval comp-j">[${intervals[j][0]},${intervals[j][1]}]</span>
                `;
            } else {
                compDisplay.innerHTML = `<span style="color:#888">No comparison</span>`;
            }
            
            // Timeline
            const timeline = document.getElementById('timeline');
            const maxEnd = Math.max(...intervals.map(int => int[1])) + 2;
            timeline.innerHTML = '<div class="timeline-axis"></div>' + 
                intervals.map((int, idx) => {
                    const left = 20 + (int[0] / maxEnd) * (timeline.offsetWidth - 40);
                    const width = ((int[1] - int[0]) / maxEnd) * (timeline.offsetWidth - 40);
                    const top = 10 + idx * 25;
                    const color = colors[idx % colors.length];
                    let border = '';
                    if (!done && idx === i) border = '3px solid #c62828';
                    else if (!done && idx === j) border = '3px solid #1565c0';
                    return `<div class="timeline-bar" style="left:${left}px;width:${Math.max(width, 20)}px;top:${top}px;background:${color};border:${border}">[${int[0]},${int[1]}]</div>`;
                }).join('') +
                Array.from({length: Math.min(maxEnd + 1, 20)}, (_, k) => {
                    const x = 20 + (k / maxEnd) * (timeline.offsetWidth - 40);
                    return `<div style="position:absolute;bottom:5px;left:${x}px;font-size:0.6em;color:#666">${k}</div>`;
                }).join('');
            
            // Action indicator
            const action = document.getElementById('actionIndicator');
            if (done) {
                action.textContent = `Done! Result: ${JSON.stringify(intervals)}`;
                action.style.color = '#00897b';
            } else {
                action.textContent = `Pass ${pass}: Comparing intervals[${i}] and intervals[${j}]`;
                action.style.color = '#f5576c';
            }
            
            document.getElementById('nState').textContent = intervals.length;
        }

        function updateState() {
            document.getElementById('passState').textContent = pass;
            document.getElementById('iState').textContent = i;
            document.getElementById('jState').textContent = j;
        }

        function addLog(msg, type = 'info') {
            const log = document.getElementById('logContainer');
            log.innerHTML += `<div class="log-entry ${type}">[${stepCount}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function clearLog() { document.getElementById('logContainer').innerHTML = ''; }

        function step() {
            if (done) { stopExecution(); return; }
            stepCount++;
            
            // Start new pass if needed
            if (!changed && i === 0 && j === 1) {
                done = true;
                addLog(`No merges in pass ${pass-1}. Done!`, 'success');
                updateState();
                render();
                return;
            }
            
            if (i === 0 && j === 1 && foundMerge) {
                foundMerge = false;
                changed = true;
            }
            
            // Check current pair
            if (i < intervals.length && j < intervals.length) {
                if (overlaps(intervals[i], intervals[j])) {
                    const merged = mergeTwo(intervals[i], intervals[j]);
                    addLog(`[${intervals[i]}] ∩ [${intervals[j]}] → [${merged}]`, 'success');
                    
                    // Remove and add merged
                    intervals.splice(j, 1);
                    intervals.splice(i, 1);
                    intervals.push(merged);
                    
                    // Restart
                    i = 0;
                    j = 1;
                    pass++;
                    foundMerge = true;
                    addLog(`Pass ${pass}: Restart with ${intervals.length} intervals`, 'info');
                } else {
                    addLog(`[${intervals[i]}] ∩ [${intervals[j]}] = ∅`, 'warning');
                    
                    // Move to next pair
                    j++;
                    if (j >= intervals.length) {
                        i++;
                        j = i + 1;
                    }
                }
            }
            
            // Check if pass complete
            if (i >= intervals.length - 1) {
                if (!foundMerge) {
                    done = true;
                    addLog(`No more overlaps. Done!`, 'success');
                } else {
                    i = 0;
                    j = 1;
                }
            }
            
            updateState();
            render();
        }

        function play() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('playBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('stepBtn').disabled = true;
            runLoop();
        }

        function pause() {
            isRunning = false;
            document.getElementById('playBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('stepBtn').disabled = false;
        }

        function stopExecution() {
            isRunning = false;
            document.getElementById('playBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('stepBtn').disabled = true;
        }

        function runLoop() {
            if (!isRunning) return;
            step();
            if (isRunning && !done) {
                setTimeout(runLoop, 500 / speed);
            } else {
                stopExecution();
            }
        }

        function reset() {
            isRunning = false;
            document.getElementById('playBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('stepBtn').disabled = false;
            init();
        }

        document.getElementById('playBtn').addEventListener('click', play);
        document.getElementById('pauseBtn').addEventListener('click', pause);
        document.getElementById('stepBtn').addEventListener('click', step);
        document.getElementById('resetBtn').addEventListener('click', reset);
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            speed = parseInt(e.target.value);
            document.getElementById('speedValue').textContent = speed + 'x';
        });

        init();
    </script>
</body>
</html>
